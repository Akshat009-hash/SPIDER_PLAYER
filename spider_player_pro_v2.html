<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Player Pro - Premium Video Experience</title>
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <style>
        :root {
            --plyr-color-main: #ff0000;
            --tg-color: #24A1DE;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-glow: rgba(255, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 95%;
            max-width: 1000px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ff0000, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* Player Styling */
        .player-wrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px var(--accent-glow);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .player-wrapper:hover {
            transform: scale(1.01);
        }

        /* Telegram Button */
        .tg-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            background: var(--tg-color);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(36, 161, 222, 0.3);
        }

        .tg-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(36, 161, 222, 0.5);
            filter: brightness(1.1);
        }

        .tg-button i {
            font-size: 1.4rem;
        }

        /* Popup Styles */
        #tgPopup {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        #tgPopup.active {
            opacity: 1;
            visibility: visible;
        }

        .popup-content {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            color: white;
            position: relative;
            max-width: 380px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            transform: scale(0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #tgPopup.active .popup-content {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            color: #888;
            cursor: pointer;
            font-size: 24px;
            transition: color 0.2s;
        }

        .close-btn:hover { color: #fff; }

        .popup-icon {
            font-size: 50px;
            color: var(--tg-color);
            margin-bottom: 20px;
        }

        .popup-content h3 {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        .popup-content p {
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .popup-btn {
            display: block;
            padding: 12px 25px;
            background: var(--tg-color);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .popup-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        /* Loading Spinner */
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: none;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--plyr-color-main);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.5rem; }
            .container { padding: 10px; }
            .tg-button { font-size: 1rem; padding: 12px; }
        }
    </style>
</head>
<body>

<div id="tgPopup">
    <div class="popup-content">
        <span class="close-btn" onclick="closePopup()">&times;</span>
        <div class="popup-icon"><i class="fab fa-telegram"></i></div>
        <h3>Join Our Community</h3>
        <p>Latest updates, new lectures, aur premium content ke liye hamara Telegram channel join karein!</p>
        <a href="https://t.me/SPIDERR67" target="_blank" class="popup-btn" onclick="closePopup()">Join Now <i class="fas fa-arrow-right"></i></a>
    </div>
</div>

<div class="container">
    <div class="header">
        <h1>Spider Player Pro</h1>
    </div>

    <div class="player-wrapper">
        <div id="loading"><div class="spinner"></div></div>
        <video id="player" playsinline controls crossorigin="anonymous"></video>
    </div>

    <a href="https://t.me/SPIDERR67" target="_blank" class="tg-button">
        <i class="fab fa-telegram-plane"></i> Join Telegram Channel
    </a>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
    // Show popup on load
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('tgPopup').classList.add('active');
        }, 1000);
    };

    function closePopup() {
        document.getElementById('tgPopup').classList.remove('active');
    }

    const video = document.getElementById('player');
    const loading = document.getElementById('loading');
    const urlParams = new URLSearchParams(window.location.search);
    const v = urlParams.get('v');

    if (v) {
        let url;
        try {
            url = v.includes('http') ? v : atob(v);
        } catch (e) {
            console.error("Invalid video URL format");
            alert("Error: Invalid video link.");
        }

        if (url) {
            // Check if it's a .webcm or .m3u8 stream
            const isHLS = url.includes('.m3u8') || url.includes('output.webcm');

            if (isHLS && Hls.isSupported()) {
                const hls = new Hls({
                    capLevelToPlayerSize: true,
                    autoStartLoad: true,
                    enableWorker: true
                });

                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    const availableQualities = hls.levels.map((l) => l.height);
                    availableQualities.unshift(0); // Add 'Auto' option

                    const player = new Plyr(video, {
                        settings: ['quality', 'speed', 'loop'],
                        quality: {
                            default: 0,
                            options: availableQualities,
                            forced: true,
                            onChange: (newQuality) => {
                                if (newQuality === 0) {
                                    hls.currentLevel = -1; // Auto
                                } else {
                                    hls.levels.forEach((level, index) => {
                                        if (level.height === newQuality) {
                                            hls.currentLevel = index;
                                        }
                                    });
                                }
                            },
                        },
                        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
                        tooltips: { controls: true, seek: true },
                        keyboard: { focused: true, global: true }
                    });
                    window.player = player;
                });

                hls.on(Hls.Events.BUFFER_APPENDING, () => loading.style.display = 'block');
                hls.on(Hls.Events.BUFFER_APPENDED, () => loading.style.display = 'none');

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                hls.destroy();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari native support
                video.src = url;
                const player = new Plyr(video);
            } else {
                // Direct MP4 or other formats
                video.src = url;
                const player = new Plyr(video);
            }
        }
    } else {
        document.querySelector('.player-wrapper').innerHTML = '<div style="padding: 50px; text-align: center; color: #888;">No video source provided. Please add ?v=YOUR_URL to the link.</div>';
    }
</script>
</body>
</html>
