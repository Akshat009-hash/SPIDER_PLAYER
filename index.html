<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Player Pro - Live Stream & Chat</title>
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <style>
        :root {
            --plyr-color-main: #ff0000;
            --tg-color: #24A1DE;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-glow: rgba(255, 0, 0, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Layout Container */
        .main-layout {
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .video-section {
            flex: 3;
            min-width: 300px;
        }

        .chat-section {
            flex: 1;
            min-width: 300px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            height: 600px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ff0000, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .view-counter {
            font-size: 0.9rem;
            color: #aaa;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 18px;
            border-radius: 20px;
            width: fit-content;
            margin: 10px auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Player Styling */
        .player-wrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px var(--accent-glow);
            border: 1px solid rgba(255, 255, 255, 0.1);
            aspect-ratio: 16/9;
        }

        /* Chat Styling */
        .chat-header {
            padding: 15px;
            background: #222;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .chat-header i { color: #ff4444; }

        #chat-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Telegram Button */
        .tg-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background: var(--tg-color);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: 0.3s;
        }

        .tg-button:hover { transform: translateY(-3px); filter: brightness(1.1); }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; padding: 10px; }
            .chat-section { height: 400px; }
        }

        #errorMessage {
            display: none;
            padding: 20px;
            text-align: center;
            color: #ff4444;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container" style="width: 100%; padding-top: 20px;">
    <div class="header">
        <h1>Spider Player Pro</h1>
        <div class="view-counter">
            <i class="fas fa-eye"></i> <span id="count">...</span> Views
        </div>
    </div>

    <div class="main-layout">
        <!-- Video Section -->
        <div class="video-section">
            <div class="player-wrapper">
                <div id="loading" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; display: none;">
                    <div style="width: 50px; height: 50px; border: 5px solid rgba(255, 255, 255, 0.1); border-top: 5px solid #ff0000; border-radius: 50%; animation: spin 1s linear infinite;"></div>
                </div>
                <div id="errorMessage">Video load nahi ho rahi.</div>
                <video id="player" playsinline controls crossorigin="anonymous" autoplay muted></video>
            </div>
            <a href="https://t.me/SPIDERR67" target="_blank" class="tg-button">
                <i class="fab fa-telegram-plane"></i> Join Telegram Channel
            </a>
        </div>

        <!-- Chat Section (Visible only if liveChatEnabled is true) -->
        <div class="chat-section" id="liveChat">
            <div class="chat-header">
                <i class="fas fa-circle" style="font-size: 8px; animation: pulse 1.5s infinite;"></i>
                LIVE CHAT
            </div>
            <!-- Using a free public chat widget (Cbox) -->
            <iframe src="https://www3.cbox.ws/box/?boxid=3534567&boxtag=spider" id="chat-frame" allow="autoplay"></iframe>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
    // --- CONFIGURATION ---
    const liveChatEnabled = true; // Isse 'false' kar do chat hatane ke liye
    // ---------------------

    if (!liveChatEnabled) {
        document.getElementById('liveChat').style.display = 'none';
    }

    async function updateCounter() {
        const countElement = document.getElementById('count');
        try {
            const uniqueKey = btoa(window.location.pathname).replace(/=/g, "").substring(0, 15);
            const response = await fetch(`https://api.countapi.xyz/hit/spider_pro_v6/${uniqueKey}`);
            const data = await response.json();
            countElement.innerText = data.value.toLocaleString();
        } catch (e) {
            countElement.innerText = "1,240";
        }
    }
    updateCounter();

    const video = document.getElementById('player');
    const urlParams = new URLSearchParams(window.location.search);
    const v = urlParams.get('v');

    function initPlyr(qualities = []) {
        const player = new Plyr(video, {
            autoplay: true,
            muted: true,
            settings: ['quality', 'speed', 'loop'],
            quality: { default: 0, options: qualities, forced: true, onChange: (q) => { if(window.hls) window.hls.currentLevel = window.hls.levels.findIndex(l => l.height === q); } }
        });
        player.on('ready', () => video.play().catch(() => {}));
        return player;
    }

    if (v) {
        let url = v.includes('http') ? v : atob(v);
        if (url) {
            if ((url.includes('.m3u8') || url.includes('webcm')) && Hls.isSupported()) {
                const hls = new Hls();
                window.hls = hls;
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    const qualities = hls.levels.map(l => l.height);
                    qualities.unshift(0);
                    initPlyr(qualities);
                });
            } else {
                video.src = url;
                initPlyr();
            }
        }
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
</script>
</body>
</html>
