<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider PLAYER PRO - FINAL FIX</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root { --plyr-color-main: #ff0000; }
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 850px; padding: 10px; }
        .player-wrapper { border-radius: 15px; overflow: hidden; background: #111; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="player-wrapper">
        <video id="videoPlayer" playsinline controls></video>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
    const video = document.getElementById('videoPlayer');
    const params = new URLSearchParams(window.location.search);
    let v = params.get('v');

    if (v) {
        try {
            // Agar link Base64 hai toh decode karega, warna direct lega
            let finalUrl = v.includes('http') ? v : atob(v);

            if (Hls.isSupported()) {
                const hls = new Hls({
                    // Stability settings for live class
                    liveSyncDuration: 30,
                    manifestLoadingMaxRetry: 20,
                    // Referrer policy ko bypass karne ke liye headers (optional)
                    xhrSetup: function(xhr, url) {
                        xhr.withCredentials = false;
                    }
                });
                
                hls.loadSource(finalUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    new Plyr(video, {
                        settings: ['quality', 'speed'],
                        quality: { default: 0, options: [0], forced: true }
                    });
                    video.play().catch(() => {});
                });
            }
        } catch (e) { console.error("Error loading stream"); }
    }
</script>
</body>
</html>
